<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Personal Data Center</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>🗂️ My Personal Data Center</h1>
    <p>Choose a section to get started</p>
  </header>

  <main class="glass-panel">
    <nav class="menu-grid" aria-label="Main menu">

      <a href="#math" class="menu-item" aria-label="Math">
        <span class="icon" aria-hidden="true">🧮</span>
        <span class="label">Math</span>
      </a>

    </nav>
  </main>

  <!-- ── Math Section ── -->
  <section id="math-section" class="glass-panel section-panel hidden" aria-label="Math – Polynomial Factoring">
    <button class="btn-back" aria-label="Back to menu">&larr; Back</button>
    <h2 class="section-title">🧮 Polynomial Factoring Practice</h2>
    <p class="section-subtitle">Factor the quadratic equation below and find its solutions.</p>

    <div class="poly-box" aria-live="polite">
      <span id="poly-equation" class="poly-equation"></span>
    </div>

    <div class="poly-controls">
      <button id="btn-show-answer" class="btn-action">Show Answer</button>
      <button id="btn-new-equation" class="btn-action btn-primary">New Equation</button>
    </div>

    <p id="poly-hint" class="poly-hint"></p>
    <p id="poly-answer" class="poly-answer hidden" aria-live="polite"></p>
  </section>

  <footer><p>My Personal Data Center &mdash; more features coming soon</p></footer>

  <script src="script.js"></script>
</body>
</html>
